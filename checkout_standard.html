<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ¡Alerta Frayles!</title>
    <link rel="icon" href="Recursos/FJ_ic.ico" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Hola.css">
</head>

<body>
    <div class="fondo-blob" aria-hidden="true">
        <div class="burbuja burbuja-1"></div>
        <div class="burbuja burbuja-2"></div>
        <div class="burbuja burbuja-3"></div>
        <div class="burbuja burbuja-4"></div>
    </div>

    <header class="container sticky-top pt-3" style="z-index: 1050; max-width: 800px;">
        <nav
            class="navbar navbar-expand bg-transparent nav-vidrio justify-content-between align-items-center py-2 px-4">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold m-0 fs-6" style="color: var(--blue-deep);"
                href="Index.html">
                <div
                    class="icono-logo-nav text-white overflow-hidden d-inline-flex align-items-center justify-content-center">
                    <img src="Recursos/logo.jpg" alt="Logo ¡Alerta Frayles!" class="w-100 h-100 object-fit-cover">
                </div>
                ¡Alerta Frayles!
            </a>
            <div class="navbar-nav gap-2 gap-sm-3">
                <a class="nav-link p-0 fs-7" href="Index.html#origen">Origen</a>
                <a class="nav-link p-0 fs-7" href="Index.html#funciones">Funciones</a>
                <a class="nav-link p-0 fs-7" href="Index.html#tecnologia">Tecnología</a>
                <a class="nav-link p-0 fs-7" href="Index.html#futuro">Futuro</a>
                <a class="nav-link p-0 fs-7" href="Precios.html">Precios</a>
            </div>
        </nav>
    </header>

    <main class="container py-5" style="max-width: 1100px;">
        <div class="row justify-content-center">
            <div class="col-xl-10">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-lg-5">
                        <div class="row g-4">
                            <div class="col-lg-7">
                                <h3 class="mb-4">Checkout</h3>
                                <form>
                                    <div class="row g-3">
                                        <div class="col-sm-6">
                                            <label class="form-label">Nombre completo</label>
                                            <input type="text" class="form-control" placeholder="Ej. Juan Pérez">
                                        </div>
                                        <div class="col-sm-6">
                                            <label class="form-label">Correo electrónico</label>
                                            <input type="email" class="form-control" placeholder="ejemplo@mail.com">
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Dirección</label>
                                            <input type="text" class="form-control" placeholder="Calle y número">
                                        </div>
                                        <div class="col-sm-6">
                                            <label class="form-label">Ciudad</label>
                                            <input type="text" class="form-control" placeholder="Ciudad">
                                        </div>
                                        <div class="col-sm-6">
                                            <label class="form-label">Código postal</label>
                                            <input type="text" class="form-control" placeholder="00000">
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Método de pago</label>
                                            <select class="form-select">
                                                <option selected>Tarjeta de crédito</option>
                                                <option>PayPal</option>
                                                <option>Transferencia</option>
                                            </select>
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Nombre en la tarjeta</label>
                                            <input type="text" class="form-control" placeholder="Nombre completo">
                                        </div>
                                        <div class="col-sm-7">
                                            <label class="form-label">Número de tarjeta</label>
                                            <input type="text" class="form-control" placeholder="0000 0000 0000 0000">
                                        </div>
                                        <div class="col-sm-3">
                                            <label class="form-label">Vence</label>
                                            <input type="text" class="form-control" placeholder="MM/AA">
                                        </div>
                                        <div class="col-sm-2">
                                            <label class="form-label">CVC</label>
                                            <input type="text" class="form-control" placeholder="123">
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="col-lg-5">
                                <div class="bg-light rounded-4 p-4 h-100">
                                    <h5 class="mb-4">Resumen de la orden</h5>
                                    <ul class="list-group list-group-flush mb-4">
                                        <li
                                            class="list-group-item d-flex justify-content-between align-items-center px-0">
                                            Servicio Standard
                                            <span class="fw-bold">$2,500.00</span>
                                        </li>
                                    </ul>
                                    <div class="d-flex justify-content-between fw-semibold mb-3">
                                        <span>Total</span>
                                        <span>$2,500.00</span>
                                    </div>
                                    <p class="text-muted small">Ingresar los datos de pago no genera ningún cargo real
                                        en esta demo.</p>
                                    <button type="button" class="btn btn-primary w-100">Pagar ahora</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer
        class="border-top border-white border-opacity-25 py-4 text-center position-relative bg-white bg-opacity-10 text-secondary"
        style="z-index: 1;">
        <div class="container d-flex flex-wrap justify-content-center gap-2 small">
            <div><span class="fw-bold text-primary">¡Alerta Frayles!</span> · Seguridad escolar en la palma
                de tu mano</div>
            <div class="text-muted">| Desarrollado por Saúl Ochoa</div>
        </div>
    </footer>


</body>

</html>
